name: Build, Push, and Update Chart

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SNYK_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- BACKEND ---
      - name: Build backend image (local)
        uses: docker/build-push-action@v5
        with:
          context: backend
          target: production
          load: true
          tags: local-backend:latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          target: production
          push: true
          tags: |
            dzanak/blog-cms-backend:${{ github.sha }}
            dzanak/blog-cms-backend:latest

      # --- FRONTEND ---
      - name: Build frontend image (local)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          target: production
          load: true
          tags: local-frontend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          target: production
          push: true
          tags: |
            dzanak/blog-cms-frontend:${{ github.sha }}
            dzanak/blog-cms-frontend:latest

      # --- UPDATE HELM CHART ---
      - name: Update Helm chart image tags
        run: |
          yq -i '.backend.image.tag = "${{ github.sha }}"' charts/blog-cms/values.yaml
          yq -i '.frontend.image.tag = "${{ github.sha }}"' charts/blog-cms/values.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add charts/blog-cms/values.yaml
          git commit -m "Update image tags to ${{ github.sha }} [skip ci]"
          git push
