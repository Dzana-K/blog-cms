apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blog-cms-backend-hpa
  namespace: blog-cms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blog-cms-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
