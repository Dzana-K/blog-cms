apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-cms-backend
  namespace: blog-cms
  labels:
    app: blog-cms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-cms-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: blog-cms-backend
    spec:
      serviceAccountName: blog-cms-backend
      containers:
        - name: backend
          image: dzanak/blog-cms-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: blog-cms-config
            - secretRef:
                name: blog-cms-db-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
