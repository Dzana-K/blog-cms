apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blog-cms-backend-role
  namespace: blog-cms
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blog-cms-backend-binding
  namespace: blog-cms
subjects:
  - kind: ServiceAccount
    name: blog-cms-backend
    namespace: blog-cms
roleRef:
  kind: Role
  name: blog-cms-backend-role
  apiGroup: rbac.authorization.k8s.io
