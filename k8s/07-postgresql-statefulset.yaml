apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blog-cms-postgresql
  namespace: blog-cms
  labels:
    app: blog-cms-postgresql
spec:
  serviceName: blog-cms-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: blog-cms-postgresql
  template:
    metadata:
      labels:
        app: blog-cms-postgresql
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: blog-cms-db-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bloguser"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bloguser"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: blog-cms-postgresql-pvc
