apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blog-cms-postgresql
  namespace: blog-cms
  annotations:
    ignore-check.kube-linter.io/run-as-non-root: "Official PostgreSQL image requires root for initialization then drops to postgres user"
  labels:
    app: blog-cms-postgresql
spec:
  serviceName: blog-cms-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: blog-cms-postgresql
  template:
    metadata:
      labels:
        app: blog-cms-postgresql
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: blog-cms-db-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bloguser"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bloguser"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: blog-cms-postgresql-pvc
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
