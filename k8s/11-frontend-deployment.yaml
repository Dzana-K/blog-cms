apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-cms-frontend
  namespace: blog-cms
  labels:
    app: blog-cms-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-cms-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: blog-cms-frontend
    spec:
      serviceAccountName: blog-cms-frontend
      containers:
        - name: frontend
          image: dzanak/blog-cms-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
