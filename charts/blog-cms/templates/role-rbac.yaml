apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blog-cms-backend-role
  labels:
    {{- include "blog-cms.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blog-cms-backend-binding
  labels:
    {{- include "blog-cms.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: blog-cms-backend
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: blog-cms-backend-role
  apiGroup: rbac.authorization.k8s.io
