apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: blog-cms-postgresql
  annotations:
    ignore-check.kube-linter.io/run-as-non-root: "Official PostgreSQL image requires root for initialization then drops to postgres user"
  labels:
    app: blog-cms-postgresql
    {{- include "blog-cms.labels" . | nindent 4 }}
spec:
  serviceName: blog-cms-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: blog-cms-postgresql
  template:
    metadata:
      labels:
        app: blog-cms-postgresql
    spec:
      securityContext:
        {{- toYaml .Values.postgresql.podSecurityContext | nindent 8 }}
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: blog-cms-db-secret
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.postgresql.securityContext | nindent 12 }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: blog-cms-postgresql-pvc
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
