apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-cms-frontend
  labels:
    app: blog-cms-frontend
    {{- include "blog-cms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: blog-cms-frontend
  template:
    metadata:
      labels:
        app: blog-cms-frontend
    spec:
      serviceAccountName: blog-cms-frontend
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
